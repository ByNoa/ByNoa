<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.ico">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Noa Aguilera</title>
  <style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --black: #1a1a1a;
  --gray: #888;
  --light: #f5f5f5;
  --nav-h: 60px;
}

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--white);
  color: var(--black);
  font-size: 15px;
  line-height: 1.6;
}

/* NAV */
header { transition: transform 0.3s ease; }
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2vw;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.site-title {
  font-size: 25px;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-decoration: none;
  color: var(--black);
}
nav a {
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  color: var(--black);
  margin-left: 2rem;
  letter-spacing: 0.05em;
  opacity: 0.7;
  transition: opacity .2s;
}
nav a:hover, nav a.active { opacity: 1; text-decoration: underline; }

/* MAIN */
main {
  margin-top: var(--nav-h);
  min-height: calc(100vh - var(--nav-h));
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* LEFT */
.contact-left {
  padding: 6vw 4vw;
  display: flex;
  align-items: flex-start;
}
.contact-left h1 {
  font-size: clamp(3rem, 7vw, 7rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1;
}

/* RIGHT */
.contact-right {
  padding: 6vw 4vw 6vw 2vw;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 1.4rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-row .form-group {
  min-width: 0;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--black);
  background: var(--light);
  border: 1px solid #ccc;
  border-radius: 0;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--black);
}
.form-group textarea {
  resize: vertical;
  min-height: 120px;
}

.send-btn {
  align-self: flex-start;
  background: var(--gray);
  color: var(--white);
  border: none;
  padding: 0.8rem 1.6rem;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: background 0.2s;
}
.send-btn:hover {
  background: var(--black);
}
.send-btn:disabled {
  background: var(--gray);
  cursor: not-allowed;
  opacity: 0.6;
}
.send-btn:not(:disabled) {
  background: var(--black);
}
.form-group input:invalid:not(:placeholder-shown) {
  border-color: #c00;
}
.field-error {
  font-size: 12px;
  color: #c00;
  display: none;
  margin-top: 3px;
}
.char-count {
  font-size: 12px;
  color: var(--gray);
  text-align: right;
}

/* MOBILE */
@media (max-width: 768px) {
  nav { display: none; }
  .nav-burger { display: block; }
  .site-title { white-space: nowrap; }
  .contact-wrap { flex-direction: column !important; align-items: flex-start !important; gap: 1.2rem; padding: 8vw 6vw !important; }
  .contact-wrap h1 { font-size: clamp(1.8rem, 8vw, 3rem) !important; }
  .contact-btn { font-size: 0.85rem; padding: 0.6rem 1.2rem !important; }
  main { grid-template-columns: 1fr; }
  .contact-left { padding: 8vw 5vw 2vw; }
  .contact-right { padding: 2vw 5vw 8vw; }
  .form-row { grid-template-columns: 1fr; }
}

  
/* MOBILE MENU */
.nav-burger { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--black); line-height: 1; padding: 4px 8px; }
.nav-mobile { display: none; position: fixed; top: var(--nav-h); left: 0; right: 0; background: rgba(255,255,255,0.97); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,0.06); z-index: 99; flex-direction: column; padding: 1rem 6vw 1.5rem; gap: 1rem; }
.nav-mobile.open { display: flex; }
.nav-mobile a { font-size: 18px; font-weight: 600; text-decoration: none; color: var(--black); opacity: 0.7; }
.nav-mobile a:hover, .nav-mobile a.active { opacity: 1; text-decoration: underline; }
</style>
</head>
<body>
<header>
  <a class="site-title" href="index.html">Noa Aguilera</a>
  <nav>
    <a href="index.html">Projects</a>
    <a href="about.html">About me</a>
  </nav>
  <button class="nav-burger" id="nav-burger" aria-label="Menu">+</button>
</header>
<div class="nav-mobile" id="nav-mobile">
  <a href="index.html">Projects</a>
    <a href="about.html">About me</a>
</div>
<main>
  <div class="contact-left">
    <h1>Contact Me!</h1>
  </div>
  <div class="contact-right">
    <div class="form-row">
      <div class="form-group">
        <label for="nombre">First Name</label>
        <input type="text" id="nombre" name="nombre" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label for="apellido">Last Name</label>
        <input type="text" id="apellido" name="apellido" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" autocomplete="email" placeholder=" ">
      <span class="field-error" id="email-error">Please enter a valid e-mail address (e.g. name@domain.com)</span>
    </div>
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" maxlength="2500"></textarea>
      <span class="char-count" id="char-count">0 / 2500</span>
    </div>
    <button class="send-btn" type="button" id="send-btn" disabled>Send</button>
  </div>
</main>
<script>
var fields = ['nombre', 'apellido', 'email', 'title', 'message'];
var btn = document.getElementById('send-btn');
var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
function checkAll() {
  var allFilled = fields.every(function(id) {
    return document.getElementById(id).value.trim() !== '';
  });
  var emailValid = emailRegex.test(document.getElementById('email').value);
  btn.disabled = !(allFilled && emailValid);
}
fields.forEach(function(id) {
  document.getElementById(id).addEventListener('input', checkAll);
});

document.getElementById('email').addEventListener('blur', function() {
  var err = document.getElementById('email-error');
  var val = this.value;
  var valid = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(val);
  err.style.display = (val !== '' && !valid) ? 'block' : 'none';
});

document.getElementById('message').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length + ' / 2500';
});

var burger = document.getElementById('nav-burger');
var mobileNav = document.getElementById('nav-mobile');
burger.addEventListener('click', function() {
  var open = mobileNav.classList.toggle('open');
  burger.textContent = open ? '×' : '+';
});

var lastY = 0;
var header = document.querySelector('header');
window.addEventListener('scroll', function() {
  var y = window.scrollY;
  if (y > lastY && y > 80) {
    header.style.transform = 'translateY(-100%)';
  } else {
    header.style.transform = 'translateY(0)';
  }
  lastY = y;
});


var _burger = document.getElementById('nav-burger');
var _mobileNav = document.getElementById('nav-mobile');
if (_burger && _mobileNav) {
  _burger.addEventListener('click', function() {
    var open = _mobileNav.classList.toggle('open');
    _burger.textContent = open ? '×' : '+';
  });
}
var _lastY = 0;
var _hdr = document.querySelector('header');
if (_hdr) {
  _hdr.style.transition = 'transform 0.3s ease';
  window.addEventListener('scroll', function() {
    var y = window.scrollY;
    if (y > _lastY && y > 80) { _hdr.style.transform = 'translateY(-100%)'; }
    else { _hdr.style.transform = 'translateY(0)'; }
    _lastY = y;
  });
}
</script>
</body>
</html>
