<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.ico">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Noa Aguilera</title>
  <link rel="preconnect" href="https://images.squarespace-cdn.com">
  <style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --black: #1a1a1a;
  --gray: #888;
  --light: #f5f5f5;
  --accent: #1a1a1a;
  --nav-h: 60px;
  --max-w: 1400px;
  --gap: 12px;
}

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--white);
  color: var(--black);
  font-size: 15px;
  line-height: 1.6;
}

/* NAV */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2vw;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.site-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-decoration: none;
  color: var(--black);
}
nav a {
  font-size: 13px;
  text-decoration: none;
  color: var(--black);
  margin-left: 2rem;
  letter-spacing: 0.05em;
  opacity: 0.7;
  transition: opacity .2s;
}
nav a:hover, nav a.active { opacity: 1; }

/* MAIN */
main {
  margin-top: var(--nav-h);
}

/* HERO / TEXT SECTIONS */
.section-text {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 5vw 4vw;
}
.section-text h1 {
  font-size: clamp(2rem, 5vw, 4.5rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}
.section-text h2 {
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  font-weight: 600;
  margin-bottom: 1rem;
  margin-top: 3rem;
}
.section-text p {
  font-size: clamp(0.9rem, 1.2vw, 1.05rem);
  max-width: 70ch;
  color: #444;
  margin-bottom: 0.9rem;
}
.section-text .meta {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 0.5rem;
}
.section-text .next-link {
  display: inline-block;
  margin-top: 3rem;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  border-bottom: 1px solid var(--black);
  padding-bottom: 2px;
}
.section-text .next-link:hover { opacity: 0.6; }

/* PROJECT TITLE LINK SECTION */
.project-label {
  padding: 3vw 4vw 1vw;
  max-width: var(--max-w);
  margin: 0 auto;
}
.project-label h2 {
  font-size: clamp(1rem, 1.8vw, 1.5rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.project-label a {
  color: var(--black);
  text-decoration: none;
}
.project-label a:hover { opacity: 0.6; }

/* GALLERY GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr));
  gap: var(--gap);
  padding: 0 var(--gap) var(--gap);
  max-width: var(--max-w);
  margin: 0 auto;
}
.gallery.gallery--wide {
  grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
}
.gallery img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  background: var(--light);
}

/* CONTACT */
.contact-wrap {
  padding: 8vw 4vw;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.contact-wrap h1 {
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 700;
  margin-bottom: 2rem;
}
.contact-wrap a {
  display: inline-block;
  font-size: 1.1rem;
  color: var(--black);
  text-decoration: none;
  border-bottom: 1px solid var(--black);
  margin: 0.5rem 1rem;
}
.contact-wrap a:hover { opacity: 0.5; }

/* FOOTER */
footer {
  padding: 3rem 4vw;
  text-align: center;
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 0.05em;
}

/* MOBILE */
@media (max-width: 768px) {
  header { padding: 0 5vw; }
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .gallery img { aspect-ratio: 1/1; }
  .section-text { padding: 8vw 5vw; }
}
@media (max-width: 480px) {
  .gallery { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header>
  <a class="site-title" href="index.html">Noa Aguilera</a>
  <nav>
    <a href="index.html" class="active">Projects</a>
    <a href="about.html">About me</a>
  </nav>
</header>
<main>
<div class="contact-wrap">
  <h1>Contact</h1>
  <p>Get in touch for collaborations, commissions, or just to say hello.</p>
  <a href="mailto:hola@bynoa.es">hola@bynoa.es</a>
  <a href="https://www.instagram.com/bynoa.es" target="_blank" rel="noopener">Instagram</a>
  <a href="https://www.linkedin.com/in/noaaguileradesign" target="_blank" rel="noopener">LinkedIn</a>
</div>
</main>
<footer>© Noa Aguilera</footer>
</body>
</html>
